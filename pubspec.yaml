name: figma_to_flutter_app
description: A Flutter application converted from Figma design
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.17.0 <4.0.0'  # Compatible with Flutter 3.10.x for macOS 13.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  go_router: ^11.0.0  # Совместимо с Flutter 3.10.x
  provider: ^6.1.1
  intl: ^0.18.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

